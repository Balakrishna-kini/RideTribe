services:
  - type: web
    name: ridertribe-backend
    env: python
    buildCommand: "./render_build.sh"
    startCommand: "gunicorn ridertribe.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: ridertribe.settings
